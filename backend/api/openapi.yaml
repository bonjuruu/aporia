openapi: 3.0.3
info:
  title: Aporia — Philosophy Graph Explorer API
  description: REST API for the Philosophy Graph Explorer, a Neo4j-backed knowledge graph of philosophical thinkers, concepts, claims, and texts.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Register a new user
      description: Creates a new user account and sets an httpOnly JWT cookie.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created and authenticated (JWT cookie set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      summary: Login
      description: Authenticates user and sets an httpOnly JWT cookie.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated (JWT cookie set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      summary: Logout
      description: Clears the JWT and CSRF cookies.
      tags: [Auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/auth/me:
    get:
      summary: Get the current authenticated user
      tags: [Auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/graph:
    get:
      summary: Get the full graph for visualization
      tags: [Graph]
      responses:
        "200":
          description: Full graph data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"

  /api/graph/subgraph/{textId}:
    get:
      summary: Get subgraph for reading mode
      tags: [Graph]
      parameters:
        - name: textId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subgraph data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"

  /api/graph/path:
    get:
      summary: Find the shortest path between two nodes
      tags: [Graph]
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
        - name: to
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Path data (nodes and edges along the path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"
        "400":
          description: Missing from or to parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/nodes:
    get:
      summary: List all nodes
      tags: [Nodes]
      responses:
        "200":
          description: List of graph nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GraphNode"
    post:
      summary: Create a new node
      tags: [Nodes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeRequest"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphNode"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/nodes/{id}:
    get:
      summary: Get a single node with connections
      tags: [Nodes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Node detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDetail"
        "404":
          description: Node not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update a node
      tags: [Nodes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNodeRequest"
      responses:
        "200":
          description: Node updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a node and all its relationships
      tags: [Nodes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Node deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/search:
    get:
      summary: Full text search across all nodes
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching nodes (max 20)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GraphNode"
        "400":
          description: Query is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/edges:
    post:
      summary: Create a new edge between two nodes
      tags: [Edges]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEdgeRequest"
      responses:
        "201":
          description: Created edge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Edge"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/edges/{id}:
    put:
      summary: Update an edge
      tags: [Edges]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEdgeRequest"
      responses:
        "200":
          description: Edge updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete an edge
      tags: [Edges]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Edge deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/annotations:
    get:
      summary: Get all annotations for the current user
      tags: [Annotations]
      responses:
        "200":
          description: List of user annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserAnnotation"

  /api/annotations/{nodeId}:
    put:
      summary: Upsert annotation (stance and notes) for a node
      tags: [Annotations]
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnotationRequest"
      responses:
        "200":
          description: Annotation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/quotes:
    get:
      summary: List quotes for the current user
      tags: [Quotes]
      parameters:
        - name: textId
          in: query
          required: false
          schema:
            type: string
          description: Optional filter by source text ID
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      summary: Capture a new quote
      tags: [Quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Captured quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/quotes/{id}:
    put:
      summary: Update a quote's reaction or page
      tags: [Quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteRequest"
      responses:
        "200":
          description: Quote updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a quote
      tags: [Quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/quotes/{id}/promote:
    post:
      summary: Promote a quote to a graph node
      tags: [Quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Quote ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeRequest"
      responses:
        "201":
          description: Promoted node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphNode"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/progress:
    get:
      summary: List reading progress for all texts
      tags: [Progress]
      responses:
        "200":
          description: List of reading progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReadingProgress"

  /api/progress/{textId}:
    get:
      summary: Get reading progress for a specific text
      tags: [Progress]
      parameters:
        - name: textId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reading progress (empty progress if none exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadingProgress"
    put:
      summary: Update reading progress for a text
      tags: [Progress]
      parameters:
        - name: textId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProgressRequest"
      responses:
        "200":
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadingProgress"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: aporia_token
      description: httpOnly JWT cookie (primary auth method)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token fallback (Swagger UI, API clients). CSRF is not enforced for Bearer auth.

  schemas:
    NodeType:
      type: string
      enum: [THINKER, CONCEPT, CLAIM, TEXT]

    EdgeType:
      type: string
      enum:
        - INFLUENCED
        - COINED
        - WROTE
        - ARGUES
        - APPEARS_IN
        - REFUTES
        - SUPPORTS
        - QUALIFIES
        - BUILDS_ON
        - DERIVES_FROM
        - RESPONDS_TO

    QuoteStatus:
      type: string
      enum: [raw, promoted]

    Stance:
      type: string
      enum: [agree, disagree, uncertain, unread]

    Error:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
      required:
        - status
        - error

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt

    GraphNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        type:
          $ref: "#/components/schemas/NodeType"
        year:
          type: integer
          nullable: true
      required:
        - id
        - label
        - type

    Edge:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        type:
          $ref: "#/components/schemas/EdgeType"
        description:
          type: string
        sourceTextId:
          type: string
        sourceTextTitle:
          type: string
      required:
        - id
        - source
        - target
        - type

    ConnectionEntry:
      type: object
      properties:
        edge:
          $ref: "#/components/schemas/Edge"
        node:
          $ref: "#/components/schemas/GraphNode"
      required:
        - edge
        - node

    NodeDetail:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NodeType"
        properties:
          type: object
          additionalProperties: true
        outgoing:
          type: array
          items:
            $ref: "#/components/schemas/ConnectionEntry"
        incoming:
          type: array
          items:
            $ref: "#/components/schemas/ConnectionEntry"
      required:
        - id
        - type
        - properties

    GraphData:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
      required:
        - nodes
        - edges

    UserAnnotation:
      type: object
      properties:
        userId:
          type: string
        nodeId:
          type: string
        stance:
          $ref: "#/components/schemas/Stance"
        notes:
          type: string
      required:
        - userId
        - nodeId
        - stance
        - notes

    Quote:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        sourceTextId:
          type: string
        sourceTextTitle:
          type: string
        page:
          type: integer
          nullable: true
        reaction:
          type: string
        status:
          $ref: "#/components/schemas/QuoteStatus"
        promotedNodeId:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - sourceTextId
        - status
        - createdAt

    SessionNote:
      type: object
      properties:
        date:
          type: string
          format: date-time
        chapter:
          type: string
        note:
          type: string
      required:
        - date
        - chapter

    ReadingProgress:
      type: object
      properties:
        textId:
          type: string
        textTitle:
          type: string
        chapter:
          type: string
        totalChapters:
          type: integer
          nullable: true
        lastReadAt:
          type: string
          format: date-time
        sessionNotes:
          type: array
          items:
            $ref: "#/components/schemas/SessionNote"
      required:
        - textId
        - chapter
        - lastReadAt

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72
      required:
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    CreateNodeRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/NodeType"
        name:
          type: string
          description: Required for THINKER and CONCEPT
        title:
          type: string
          description: Required for TEXT
        content:
          type: string
          description: Required for CLAIM
        description:
          type: string
        notes:
          type: string
        tradition:
          type: string
          description: THINKER only
        bornYear:
          type: integer
          nullable: true
          description: THINKER only
        diedYear:
          type: integer
          nullable: true
          description: THINKER only
        year:
          type: integer
          nullable: true
          description: CONCEPT and CLAIM only
        publishedYear:
          type: integer
          nullable: true
          description: TEXT only
      required:
        - type

    UpdateNodeRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/NodeType"
        name:
          type: string
        title:
          type: string
        content:
          type: string
        description:
          type: string
        notes:
          type: string
        tradition:
          type: string
        bornYear:
          type: integer
          nullable: true
        diedYear:
          type: integer
          nullable: true
        year:
          type: integer
          nullable: true
        publishedYear:
          type: integer
          nullable: true
      required:
        - type

    CreateEdgeRequest:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        type:
          $ref: "#/components/schemas/EdgeType"
        description:
          type: string
        sourceTextId:
          type: string
      required:
        - source
        - target
        - type

    UpdateEdgeRequest:
      type: object
      properties:
        description:
          type: string
        sourceTextId:
          type: string

    CreateQuoteRequest:
      type: object
      properties:
        content:
          type: string
        sourceTextId:
          type: string
        page:
          type: integer
          minimum: 1
        reaction:
          type: string
      required:
        - content
        - sourceTextId

    UpdateQuoteRequest:
      type: object
      properties:
        reaction:
          type: string
        page:
          type: integer
          minimum: 1

    UpdateProgressRequest:
      type: object
      properties:
        chapter:
          type: string
        totalChapters:
          type: integer
          minimum: 1
        note:
          type: string
      required:
        - chapter

    AnnotationRequest:
      type: object
      properties:
        stance:
          $ref: "#/components/schemas/Stance"
        notes:
          type: string
      required:
        - stance
        - notes
