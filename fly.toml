app = 'aporia'
primary_region = 'syd'

[build]

[env]
  COOKIE_SECURE = 'true'
  # Set via `fly secrets set`:
  #   JWT_SECRET, NEO4J_URI, NEO4J_USERNAME, NEO4J_PASSWORD, ALLOW_ORIGIN

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    type = 'http'
    port = 8080
    path = '/healthz'
    interval = '30s'
    timeout = '5s'
