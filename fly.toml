# fly.toml app configuration file generated for aporia on 2026-03-26T20:45:55+13:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aporia'
primary_region = 'syd'

[build]

[env]
  COOKIE_SECURE = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/healthz'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
